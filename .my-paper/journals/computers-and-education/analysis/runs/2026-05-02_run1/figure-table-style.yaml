# 图表风格分析：Computers & Education

基于期刊论文的图表规范和分析生成。

## 1. 图表类型偏好

### 图（Figures）
- **条形图/柱状图** (40%): 用于比较组间差异（如实验组vs对照组）
- **折线图** (25%): 用于展示随时间的变化趋势
- **散点图+回归线** (15%): 用于展示变量间关系
- **箱线图** (10%): 用于展示数据分布和离群值
- **流程图/概念图** (10%): 用于展示理论框架或实验流程

### 表（Tables）
- **描述性统计表** (30%): 均值、标准差、频数
- **相关性矩阵** (25%): 变量间相关系数
- **回归/ANOVA结果表** (25%): 统计检验结果
- **参与者特征表** (20%): 人口统计学信息

## 2. 图表规范

### 分辨率与格式
- **分辨率**: 至少300 dpi（期刊要求）
- **格式**: TIFF 或 EPS（位图用TIFF，矢量图用EPS）
- **颜色模式**: RGB（屏幕显示）或 CMYK（印刷）
- **文件大小**: 单图不超过10MB

### 尺寸
- **单栏图**: 宽度 85mm（约3.35英寸）
- **1.5栏图**: 宽度 110-120mm
- **双栏图**: 宽度 170mm（约6.7英寸）
- **高度**: 不超过 225mm（约8.86英寸）

### 字体
- **字体类型**: Arial, Helvetica, 或 Times New Roman
- **字体大小**: 8-12 pt（坐标轴标签、图例）
- **避免使用**: 衬线字体（除Times系列外）、手写字体

### 颜色
- **配色方案**: 
  - 推荐使用ColorBrewer配色（colorblind-friendly）
  - 避免红绿搭配（色盲不可辨）
  - 推荐使用：蓝色系(#1f77b4)、橙色系(#ff7f0e)、绿色系(#2ca02c)
- **灰度图**: 如投黑白印刷版，需用不同图案区分（斜线、点状、网格）

### 线条与标记
- **线条粗细**: 0.5-2 pt
- **坐标轴线条**: 0.75 pt
- **误差线**: 标准误(SE)或置信区间(CI)，不能用标准偏差(SD)
- **标记大小**: 4-8 pt（散点图中的数据点）

## 3. 图表标题与标注

### 图标题（Figure Caption）
- **位置**: 图下方
- **格式**: `Figure 1. 描述性标题（句子首字母大写，其余小写）`
- **长度**: 1-2句话（约15-25词）
- **内容**: 
  - 说明图的主要内容
  - 必要时解释图例或特殊符号
  - 不重复正文内容

**示例**:
```
Figure 1. Comparison of student engagement between experimental group (AI chatbot) 
and control group (traditional instruction). Error bars represent standard error.
```

### 表标题（Table Caption）
- **位置**: 表上方
- **格式**: `Table 1. 描述性标题（粗体）`
- **长度**: 1句话（约10-20词）

**示例**:
```
Table 1. Descriptive statistics of participant demographics by group.
```

### 坐标轴标注
- **X轴**: 清晰标注变量名和单位（如适用）
- **Y轴**: 清晰标注变量名和单位
- **刻度标签**: 使用易读的数字格式（如1,000而非1000）

### 图例（Legend）
- **位置**: 图内空白处或右侧
- **格式**: 简洁，避免过长描述
- **顺序**: 与图中出现顺序一致

## 4. 图表内容规范

### 数字精度
- **百分比**: 保留1位小数（如45.3%）
- **p值**: 报告精确值（如p = .032），若p < .001则报告p < .001
- **效应量**: 保留2位小数（如d = 0.65, η² = 0.12）
- **置信区间**: 保留2位小数（如95% CI [0.45, 0.78]）

### 统计符号
- **斜体**: 统计符号用斜体（t, F, p, M, SD, SE）
- **希腊字母**: 用希腊字母（α, β, γ, η, μ, σ）
- **上标/下标**: 正确使用（如R², t(58) = 2.45）

### 缩写
- **首次出现**: 在图表或标题中首次出现时需定义
- **图例**: 避免使用过多缩写

## 5. 常见问题与避坑指南

### ❌ 避免的错误
1. **分辨率过低**: 低于300 dpi的图会被要求重交
2. **颜色不友好**: 红绿搭配，色盲读者无法区分
3. **字体过小**: 图表缩放到栏宽后文字看不清
4. **标题不完整**: 只写"Results"或"Comparison"，未说明具体内容
5. **误差线错误**: 用标准差(SD)而非标准误(SE)或置信区间(CI)
6. **图表与正文不一致**: 正文说"见图1"，实际图中无对应数据

### ✅ 最佳实践
1. **提前规划**: 在数据分析阶段就考虑如何可视化
2. **简洁为王**: 每张图只传达1-2个核心信息
3. **自解释性**: 图表应尽可能自包含（读者不看正文也能理解）
4. **一致性**: 全文字体、配色、风格保持一致
5. **可访问性**: 考虑色盲读者，使用Pattern或高对比度颜色

## 6. 推荐工具

### 绘图软件
- **R**: ggplot2（推荐，高度可定制）
- **Python**: matplotlib, seaborn, plotnine
- **其他**: SigmaPlot, GraphPad Prism（生命科学常用）

### 表格制作
- **Word**: 插入表格（简单表格）
- **LaTeX**: booktabs宏包（专业表格）
- **R**: kableExtra, stargazer（回归结果表）

### 图表检查工具
- **ColorBrewer**: 配色方案（colorbrewer2.org）
- **Color Oracle**: 色盲模拟工具
- **GIMP/ImageJ**: 检查分辨率和尺寸

## 7. 投稿前图表检查清单

- [ ] 分辨率≥300 dpi？
- [ ] 格式为TIFF或EPS？
- [ ] 字体清晰可读（8-12 pt）？
- [ ] 颜色方案色盲友好？
- [ ] 标题完整、准确？
- [ ] 坐标轴标注清晰、含单位？
- [ ] 误差线使用SE或CI（非SD）？
- [ ] 统计符号使用斜体？
- [ ] 图表与正文引用一致？
- [ ] 图表按顺序编号（Figure 1, 2, 3...）？
- [ ] 图表在正文中有引用（如"see Figure 1"）？

