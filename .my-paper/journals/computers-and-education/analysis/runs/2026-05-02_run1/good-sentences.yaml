# 好句子库：Computers & Education

从高分论文中提取的功能性句子，按写作功能分类。

---

## 1. 指出研究空白（Identifying Research Gaps）

### 1.1 通用句型
```yaml
- template: "While [研究领域] has attracted considerable attention, [具体空白] remains understudied."
  example: "While AI in education has attracted considerable attention, its impact on student engagement in K-12 contexts remains understudied."
  translation: "虽然[研究领域]吸引了大量关注，但[具体空白]仍未得到充分研究。"

- template: "Previous studies have focused on [A], but little is known about [B]."
  example: "Previous studies have focused on AI chatbots in higher education, but little is known about their effectiveness in primary schools."
  translation: "先前研究主要关注[A]，但对[B]知之甚少。"

- template: "Despite growing interest in [主题], empirical evidence on [具体问题] is scarce."
  example: "Despite growing interest in learning analytics, empirical evidence on its impact on student retention is scarce."
  translation: "尽管对[主题]的兴趣日益增长，但关于[具体问题]的实证证据仍然稀缺。"

- template: "To date, no study has examined [研究问题] in the context of [具体情境]."
  example: "To date, no study has examined the long-term effects of AI feedback in the context of EFL writing."
  translation: "迄今为止，尚未有研究在[具体情境]背景下考察[研究问题]。"

- template: "There is a lack of consensus on [问题]."
  example: "There is a lack of consensus on the optimal frequency of AI-generated feedback."
  translation: "关于[问题]缺乏共识。"
```

### 1.2 结合文献的空白指出
```yaml
- template: "Although [作者, 年份] found that [发现], their study was limited by [局限性]."
  example: "Although Smith (2021) found that AI chatbots improve engagement, their study was limited by a small sample size (n=30)."
  translation: "虽然[作者, 年份]发现[发现]，但他们的研究受到[局限性]的限制。"

- template: "[作者, 年份] argued that [观点], but this claim has not been empirically tested."
  example: "Chen et al. (2022) argued that AI feedback enhances self-regulated learning, but this claim has not been empirically tested."
  translation: "[作者, 年份]认为[观点]，但这一说法尚未得到实证检验。"

- template: "Several studies have shown [A], but results regarding [B] are inconclusive."
  example: "Several studies have shown that AI chatbots improve behavioral engagement, but results regarding emotional engagement are inconclusive."
  translation: "多项研究表明[A]，但关于[B]的结果尚无定论。"
```

---

## 2. 报告结果（Reporting Results）

### 2.1 描述性统计
```yaml
- template: "As shown in Table [N], the mean score for [变量] was [M] (SD = [SD])."
  example: "As shown in Table 1, the mean score for student engagement was 3.85 (SD = 0.72)."
  translation: "如表[N]所示，[变量]的平均得分为[M]（标准差=[SD]）。"

- template: "[变量] ranged from [最小值] to [最大值]."
  example: "Student engagement scores ranged from 1.5 to 5.0."
  translation: "[变量]的范围从[最小值]到[最大值]。"

- template: "The majority of participants were [特征] ([百分比]%, n = [人数])."
  example: "The majority of participants were female (70%, n = 105)."
  translation: "大多数参与者是[特征]（[百分比]%，n = [人数]）。"
```

### 2.2 推断性统计（t-test）
```yaml
- template: "An independent-samples t-test revealed a significant difference in [变量], t([df]) = [值], p = [精确值], d = [效应量]."
  example: "An independent-samples t-test revealed a significant difference in engagement scores, t(148) = 2.45, p = .016, d = 0.65."
  translation: "独立样本t检验显示[变量]存在显著差异，t([df]) = [值], p = [精确值], d = [效应量]。"

- template: "No significant difference was found in [变量], t([df]) = [值], p = [值]."
  example: "No significant difference was found in satisfaction scores, t(148) = 1.23, p = .221."
  translation: "[变量]未发现显著差异，t([df]) = [值], p = [值]。"
```

### 2.3 推断性统计（ANOVA）
```yaml
- template: "A one-way ANOVA revealed a significant main effect of [因子], F([df1], [df2]) = [值], p = [精确值], η² = [效应量]."
  example: "A one-way ANOVA revealed a significant main effect of group, F(2, 147) = 4.56, p = .012, η² = 0.06."
  translation: "单因素方差分析显示[因子]的主效应显著，F([df1], [df2]) = [值], p = [精确值], η² = [效应量]。"
```

### 2.4 回归分析
```yaml
- template: "[变量] significantly predicted [结果], β = [值], t([df]) = [值], p = [精确值]."
  example: "AI chatbot usage significantly predicted student engagement, β = 0.42, t(147) = 3.21, p = .002."
  translation: "[变量]显著预测[结果]，β = [值], t([df]) = [值], p = [精确值]。"

- template: "The model explained [百分比]% of the variance in [结果], R² = [值], F([df1], [df2]) = [值], p = [精确值]."
  example: "The model explained 23% of the variance in engagement, R² = 0.23, F(3, 146) = 14.52, p < .001."
  translation: "该模型解释了[结果]中[百分比]%的方差，R² = [值], F([df1], [df2]) = [值], p = [精确值]。"
```

### 2.5  qualitative发现
```yaml
- template: "Three main themes emerged from the data: (1) [主题1], (2) [主题2], and (3) [主题3]."
  example: "Three main themes emerged from the interview data: (1) Immediate feedback, (2) 24/7 availability, and (3) Lack of human empathy."
  translation: "从数据中涌现出三个主要主题：（1）[主题1]，（2）[主题2]，和（3）[主题3]。"

- template: "Participants reported that [引用原文]."
  example: "Participants reported that 'the AI chatbot helped me understand the material better' (Student #12)."
  translation: "参与者报告说[引用原文]。"
```

