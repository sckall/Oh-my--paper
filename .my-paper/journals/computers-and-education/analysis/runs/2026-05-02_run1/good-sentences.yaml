## 7. 写作检查清单（按功能）

### 当你在写...
- **引言的研究空白**: 使用第1类句子（指出研究空白）
- **结果部分**: 使用第2类句子（报告结果），并报告精确p值和效应量
- **讨论的局限性**: 使用第3类句子（讨论局限性），客观陈述
- **讨论的贡献**: 使用第4类句子（陈述贡献），具体且不过度夸大
- **段落/句子间**: 使用第5类句子（过渡与连接）
- **引用文献**: 使用第6类句子（引用文献），遵循APA 7th格式

---

## 8. 如何使用本句子库

### 步骤1: 确定写作功能
问自己："我现在要写什么？" 
- 指出研究空白？→ 用第1类
- 报告结果？→ 用第2类
- 讨论局限性？→ 用第3类
- ...

### 步骤2: 选择合适的句型
- 根据你的数据特点选择（如：t-test结果 → 用2.2类）
- 根据语气选择（如：保守陈述 → 用"may"、"suggest"）

### 步骤3: 替换为自己的内容
- 保留句型结构（`[变量]`, `[值]`等）
- 替换为你的具体研究内容
- 检查语法和流畅性

### 步骤4: 检查引用格式
- 确保引用格式符合APA 7th
- 确保引用的文献确实支持你的陈述

