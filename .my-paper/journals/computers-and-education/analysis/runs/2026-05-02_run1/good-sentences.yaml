## 3. 讨论局限性（Discussing Limitations）

### 3.1 抽样局限
```yaml
- template: "This study was conducted in a single institution, which may limit the generalizability of the findings."
  example: "This study was conducted in a single university in China, which may limit the generalizability of the findings to other cultural contexts."
  translation: "本研究在单一机构中进行，这可能限制研究结果的普适性。"

- template: "The sample was [特征], thus the findings may not generalize to [其他群体]."
  example: "The sample was predominantly female (70%), thus the findings may not generalize to male-dominated contexts."
  translation: "样本是[特征]，因此研究结果可能无法推广到[其他群体]。"
```

### 3.2 测量局限
```yaml
- template: "The use of self-reported measures may introduce [偏差类型] bias."
  example: "The use of self-reported engagement measures may introduce social desirability bias."
  translation: "使用自我报告测量可能引入[偏差类型]偏差。"

- template: "Although [测量工具] has been validated in previous studies, it may not fully capture [具体方面]."
  example: "Although the Utrecht Work Engagement Scale has been validated in previous studies, it may not fully capture the multidimensional nature of student engagement."
  translation: "虽然[测量工具]在先前研究中已得到验证，但它可能无法完全捕捉[具体方面]。"
```

### 3.3 设计局限
```yaml
- template: "The cross-sectional design prevents causal inferences about [变量关系]."
  example: "The cross-sectional design prevents causal inferences about the relationship between AI usage and engagement."
  translation: "横截面设计妨碍了对[变量关系]的因果推断。"

- template: "The lack of a [控制组/长期追踪] limits our understanding of [具体问题]."
  example: "The lack of a control group limits our understanding of whether the observed changes were due to the AI chatbot or other factors."
  translation: "缺乏[控制组/长期追踪]限制了对[具体问题]的理解。"
```

### 3.4 共同方法偏差
```yaml
- template: "Common method bias may be a concern, as all data were collected from [同一来源]."
  example: "Common method bias may be a concern, as all data were collected from self-reported questionnaires."
  translation: "共同方法偏差可能是一个问题，因为所有数据都来自[同一来源]。"
```

