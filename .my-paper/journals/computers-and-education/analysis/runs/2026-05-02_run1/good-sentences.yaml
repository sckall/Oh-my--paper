## 4. 陈述贡献（Stating Contributions）

### 4.1 理论贡献
```yaml
- template: "This study contributes to the literature by [具体贡献]."
  example: "This study contributes to the literature by extending the Technology Acceptance Model (TAM) to the context of AI chatbots in education."
  translation: "本研究通过[具体贡献]为文献做出贡献。"

- template: "Unlike previous studies that focused on [A], this study examines [B], thereby [贡献]."
  example: "Unlike previous studies that focused on higher education, this study examines K-12 contexts, thereby providing insights into the role of age in AI adoption."
  translation: "与之前关注[A]的研究不同，本研究考察了[B]，从而[贡献]。"
```

### 4.2 方法论贡献
```yaml
- template: "This is the first study to [方法创新]."
  example: "This is the first study to use learning analytics data to validate self-reported engagement measures."
  translation: "这是第一个[方法创新]的研究。"

- template: "By employing a [方法], this study overcomes the limitations of previous [旧方法]."
  example: "By employing a mixed-methods design, this study overcomes the limitations of previous purely quantitative studies."
  translation: "通过采用[方法]，本研究克服了先前[旧方法]的局限性。"
```

### 4.3 实践意义
```yaml
- template: "The findings offer practical implications for [受众]."
  example: "The findings offer practical implications for instructional designers seeking to integrate AI tools in online courses."
  translation: "研究结果为[受众]提供了实践意义。"

- template: "Specifically, [受众] should consider [具体建议]."
  example: "Specifically, educators should consider using AI chatbots to provide immediate feedback on homework assignments."
  translation: "具体而言，[受众]应该考虑[具体建议]。"
```

