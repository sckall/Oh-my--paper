## 5. 过渡与连接（Transitions & Connections）

### 5.1 段落间过渡
```yaml
- template: "Building on this finding, [下一主题]..."
  example: "Building on this finding, the next section examines the role of self-regulated learning in AI-assisted environments."
  translation: "基于这一发现，[下一主题]..."

- template: "While the above discussion focuses on [A], it is also important to consider [B]."
  example: "While the above discussion focuses on behavioral engagement, it is also important to consider emotional engagement."
  translation: "虽然上述讨论关注[A]，但考虑[B]也很重要。"

- template: "This finding aligns with [理论/先前研究], suggesting that [解释]."
  example: "This finding aligns with Fredricks et al.'s (2004) three-dimensional model, suggesting that engagement is a multifaceted construct."
  translation: "这一发现与[理论/先前研究]一致，表明[解释]。"
```

### 5.2 句子间过渡
```yaml
- template: "[观点A]. However, [观点B]."
  example: "AI chatbots can enhance engagement. However, they cannot replace human empathy."
  translation: "[观点A]。然而，[观点B]。"

- template: "[观点]. For example, [具体例子]."
  example: "Immediate feedback promotes engagement. For example, students who received AI feedback within 5 minutes showed higher engagement scores."
  translation: "[观点]。例如，[具体例子]。"

- template: "[观点]. Consequently, [结果]."
  example: "The experimental group received immediate feedback. Consequently, their engagement scores improved significantly."
  translation: "[观点]。因此，[结果]。"
```

---

## 6. 引用文献（Citing Literature）

### 6.1 支持论点
```yaml
- template: "[研究发现] (e.g., [作者, 年份]; [作者, 年份])."
  example: "AI chatbots have been shown to enhance engagement (e.g., Smith, 2021; Johnson et al., 2022)."
  translation: "[研究发现]（例如，[作者, 年份]；[作者, 年份]）。"

- template: "Previous studies have consistently shown that [发现] ([作者, 年份]; [作者, 年份])."
  example: "Previous studies have consistently shown that immediate feedback improves learning outcomes (Hwang, 2020; Chen, 2021)."
  translation: "先前研究一致表明[发现]（[作者, 年份]；[作者, 年份]）。"
```

### 6.2 对比文献
```yaml
- template: "While [作者, 年份] found [X], [作者, 年份] reported [Y]."
  example: "While Smith (2021) found that AI chatbots improve engagement, Lee (2022) reported mixed results."
  translation: "虽然[作者, 年份]发现[X]，但[作者, 年份]报告了[Y]。"

- template: "These findings contradict [理论/先前研究], which suggested that [观点]."
  example: "These findings contradict the Technology Acceptance Model, which suggested that ease of use is the primary predictor of adoption."
  translation: "这些发现与[理论/先前研究]相矛盾，后者认为[观点]。"
```

