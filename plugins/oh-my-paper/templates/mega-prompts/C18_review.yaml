stage_id: C18
stage_name: PEER_REVIEW
group: C
order: 18
is_gate: false

objectives:
  - Internal peer review
  - Check methodology-evidence consistency
  - Simulate 2+ reviewer perspectives

inputs:
  - paper/sections/*.tex
  - .pipeline/docs/result_summary.md
  - experiments/ code

outputs:
  - .pipeline/memory/review_log.md

reviewer_perspectives:
  reviewer_a:
    focus: "Technical contribution and novelty"
    strengths: []
    weaknesses: []
    questions: []

  reviewer_b:
    focus: "Experimental evidence and reproducibility"
    strengths: []
    weaknesses: []
    questions: []

consistency_checks:
  methodology_evidence:
    - "论文声称的实验设置 vs actual code"
    - "论文声称的 trial count vs actual runs"
    - "论文声称的 metrics vs actual results"

  trial_count_check:
    - "论文说跑了 N 次 vs 代码/result_summary 显示"

  citation_check:
    - "每个 \cite{} 都有对应条目"
    - "引用与论文内容相关"

scoring_rubric:
  technical_contribution: 1-10
  experimental_sufficiency: 1-10
  writing_quality: 1-10
  reproducibility: 1-10

overall_recommendation:
  strong_accept: "8-9"
  accept: "6-7"
  weak_accept: "5-6"
  border_line: "4-5"
  reject: "1-3"

review_output_format: |
  ## Internal Review

  **Reviewer A** (Technical):
  - Score: {score}/10
  - Strengths: [list]
  - Weaknesses: [list]
  - Required Revisions: [list]

  **Reviewer B** (Evidence):
  - Score: {score}/10
  - Strengths: [list]
  - Weaknesses: [list]
  - Required Revisions: [list]

  **Consistency Issues**:
  - [issue 1]
  - [issue 2]

next_stage: C19
